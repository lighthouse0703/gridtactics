                    disabled={isAnimating || currentTurnSide === 'enemy' || gameState !== 'playing'}
                    className="px-6 py-2 bg-blue-700 hover:bg-blue-600 text-white font-bold rounded border border-blue-500 transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed shadow-[0_0_10px_rgba(37,99,235,0.4)]"
                  >
                    <IconClock /> 턴 종료
                  </button>

                  <button 
                    onClick={() => {
                        setGameState('mode_select');
                        setShowTutorial(false);
                    }}
                    disabled={isAnimating}
                    className="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded border border-slate-600 transition-colors flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    <IconAlert /> 다시 시작
                  </button>
                </div>
              </header>

              <main className="flex-1 flex overflow-hidden">
                <div className="flex-1 flex p-4 sm:p-8 bg-slate-900 overflow-auto relative">
                  {isGenerating && gameState === 'playing' ? (
                     <div className="m-auto text-xl animate-pulse text-slate-500">지형 분석 중...</div>
                  ) : (
                    <div className="m-auto relative w-full max-w-[600px] aspect-square shadow-2xl border-4 border-slate-700 bg-slate-900 overflow-hidden shrink-0">
                      
                      <div 
                        className="absolute inset-0 grid"
                        style={{ gridTemplateColumns: `repeat(${gridSize}, minmax(0, 1fr))`, gridTemplateRows: `repeat(${gridSize}, minmax(0, 1fr))` }}
                      >
                        {mapData.map((row, y) => (
                          row.map((terrain, x) => {
                            const isSelected = selectedCell?.x === x && selectedCell?.y === y;
                            const visLevel = visibilityMap[y]?.[x] || 0;
                            const isVisible = visLevel > 0;
                            
                            const reachData = reachableCells.find(c => c.x === x && c.y === y);
                            const isReachable = !!reachData;
                            const isHazardPath = isReachable && reachData.hasHazard;
                            
                            const attackData = attackableCells.find(c => c.x === x && c.y === y);
                            const isAttackable = !!attackData;
                            const isWallAttack = isAttackable && attackData.isWall;
                            
                            const isSupplyable = supplyableCells.some(c => c.x === x && c.y === y);
                            const isSpawnable = spawnableCells.some(c => c.x === x && c.y === y);
                            const isUnloadable = unloadableCells.some(c => c.x === x && c.y === y);
                            const isRadarTarget = activeRadar && Math.abs(activeRadar.x - x) + Math.abs(activeRadar.y - y) <= activeRadar.radius;

                            return (
                              <div 
                                key={`cell-${x}-${y}`}
                                onClick={() => handleCellClick(x, y)}
                                className={`
                                  w-full h-full flex items-center justify-center relative cursor-pointer
                                  ${terrain.color} hover:brightness-110 transition-colors duration-300
                                  ${isSelected ? 'ring-4 ring-yellow-400 z-40' : ''}
                                `}
                              >
                                {isReachable && !isHazardPath && <div className="absolute inset-0 bg-blue-500/40 border-2 border-blue-400/80 z-20 pointer-events-none animate-pulse"></div>}
                                {isReachable && isHazardPath && <div className="absolute inset-0 bg-yellow-500/40 border-2 border-yellow-400/80 z-20 pointer-events-none animate-pulse"></div>}
                                {isAttackable && !isWallAttack && <div className="absolute inset-0 bg-red-500/40 border-2 border-red-500/80 z-20 pointer-events-none"></div>}
                                {isAttackable && isWallAttack && <div className="absolute inset-0 bg-yellow-500/40 border-2 border-yellow-500/80 z-20 pointer-events-none animate-pulse"></div>}
                                {isSupplyable && <div className="absolute inset-0 bg-emerald-500/40 border-2 border-emerald-400/80 z-20 pointer-events-none animate-pulse"></div>}
                                {isSpawnable && <div className="absolute inset-0 bg-green-500/40 border-2 border-green-400/80 z-20 pointer-events-none animate-pulse"></div>}
                                {isUnloadable && <div className="absolute inset-0 bg-blue-400/40 border-2 border-blue-400 z-20 pointer-events-none animate-pulse"></div>}
                                
                                {isRadarTarget && <div className="absolute inset-0 bg-cyan-500/20 z-10 pointer-events-none animate-pulse"></div>}
                                
                                {!isVisible && <div className="absolute inset-0 bg-slate-900/70 z-30 pointer-events-none"></div>}

                                {terrain.icon && (
                                  <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10">
                                    {terrain.icon}
                                  </div>
                                )}
                              </div>
                            );
                          })
                        ))}
                      </div>

                      {unitData.map(unit => {
                        const visLevel = visibilityMap[unit.y]?.[unit.x] || 0;
                        const isPlayer = unit.side === 'player';
                        
                        if (!isPlayer && visLevel === 0) return null;

                        let renderUnit = unit;
                        let isUnknown = false;
                        
                        if (!isPlayer && visLevel === 1) {
                            isUnknown = true;
                            let unkColor = 'bg-red-950';
                            if (unit.type === 'building') unkColor = 'bg-rose-950';
                            else if (unit.category === 'vehicle') unkColor = 'bg-orange-950';
                            else if (unit.category === 'infantry') unkColor = 'bg-red-900';
                            
                            renderUnit = { ...unit, icon: <IconUnknown />, color: unkColor };
                        }

                        return (
                          <div
                            key={unit.uid}
                            className="absolute flex items-center justify-center pointer-events-none transition-all duration-200 ease-linear z-40"
                            style={{
                              left: `${(unit.x / gridSize) * 100}%`, top: `${(unit.y / gridSize) * 100}%`,
                              width: `${(1 / gridSize) * 100}%`, height: `${(1 / gridSize) * 100}%`,
                            }}
                          >
                            <div className={`w-3/4 h-3/4 flex items-center justify-center ${renderUnit.bg === false && !isUnknown ? '' : `${renderUnit.type === 'building' ? 'rounded-md' : 'rounded-full'} ${renderUnit.color} shadow-lg border-2 ${renderUnit.side === 'player' ? 'border-blue-300' : 'border-red-300'}`}`}>
                              {renderUnit.icon}
                            </div>
                          </div>
                        );
                      })}

                      {effects.map(effect => {
                        const isVisible = visibilityMap[effect.y]?.[effect.x] > 0;
                        if (!isVisible) return null;

                        return (
                          <div
                            key={effect.id}
                            className="absolute flex items-center justify-center z-50 pointer-events-none"
                            style={{
                              left: `${(effect.x / gridSize) * 100}%`, top: `${(effect.y / gridSize) * 100}%`,
                              width: `${(1 / gridSize) * 100}%`, height: `${(1 / gridSize) * 100}%`,
                            }}
                          >
                            {effect.type === 'attack' && (
                              <div className="absolute inset-0 flex items-center justify-center">
                                <div className="w-full h-full bg-red-500 rounded-full opacity-60 animate-ping"></div>
                                <div className="absolute text-3xl animate-pulse drop-shadow-md">💥</div>
                              </div>
                            )}
                            {effect.type === 'supply' && (
                              <div className="absolute inset-0 flex items-center justify-center animate-bounce text-emerald-400 drop-shadow-[0_0_8px_rgba(52,211,153,1)]">
                                <IconPlus />
                              </div>
                            )}
                          </div>
                        );
                      })}

                      {/* 모드 선택 화면 (MODE SELECT) */}
                      {gameState === 'mode_select' && (
                        <div className="absolute inset-0 z-[150] flex items-center justify-center bg-slate-900/90 backdrop-blur-sm">
                          <div className="bg-slate-900 border-2 border-slate-700 p-10 rounded-xl max-w-[600px] w-full text-center shadow-[0_0_50px_rgba(0,0,0,1)]">
                            <h2 className="text-4xl font-black mb-6 text-white flex items-center justify-center gap-3">
                              <IconShield />
                              게임 모드 선택
                            </h2>
                            <div className="space-y-4">
                              <button 
                                onClick={() => { setGameMode('campaign'); setGameState('difficulty_select'); }} 
                                className="w-full p-4 bg-slate-800 hover:bg-blue-900/40 border border-blue-700 rounded-lg flex flex-col items-center transition-colors shadow-lg"
                              >
                                <span className="text-xl font-bold text-blue-400">캠페인 모드</span>
                                <span className="text-xs text-slate-400 mt-2">국경선부터 적의 수도까지 5개의 스테이지를 차례대로 돌파합니다.</span>
                              </button>
                              <button 
                                onClick={() => { setGameMode('single'); setGameState('difficulty_select'); }} 
                                className="w-full p-4 bg-slate-800 hover:bg-purple-900/40 border border-purple-700 rounded-lg flex flex-col items-center transition-colors shadow-lg"
                              >
                                <span className="text-xl font-bold text-purple-400">단판 전면전 모드</span>
                                <span className="text-xs text-slate-400 mt-2">20x20 거대 맵에서 모든 유닛을 동원하여 단 한 번의 전투를 치릅니다.</span>
                              </button>
                            </div>
                          </div>
                        </div>
                      )}

                      {/* 난이도 선택 화면 (DIFFICULTY SELECT) */}
                      {gameState === 'difficulty_select' && (
                        <div className="absolute inset-0 z-[150] flex items-center justify-center bg-slate-900/90 backdrop-blur-sm">
                          <div className="bg-slate-900 border-2 border-slate-700 p-10 rounded-xl max-w-[600px] w-full text-center shadow-[0_0_50px_rgba(0,0,0,1)]">
                            <h2 className="text-4xl font-black mb-6 text-white flex items-center justify-center gap-3">
                              <IconShield />
                              작전 난이도 선택
                            </h2>
                            <p className="text-slate-400 mb-8 text-sm break-keep">
                              사령관님, 작전 지역의 적군 위협 수준을 선택하십시오.
                            </p>
                            <div className="space-y-4">
                              <button 
                                onClick={() => {
                                    if(gameMode === 'campaign') startCampaignGame('easy');
                                    else { setDifficulty('easy'); setGameState('single_upgrade_select'); }
                                }} 
                                className="w-full p-4 bg-slate-800 hover:bg-green-900/40 border border-green-700 rounded-lg flex flex-col items-center transition-colors shadow-lg"
                              >
                                <span className="text-xl font-bold text-green-400">쉬움 (신임 사령관)</span>
                                <span className="text-xs text-slate-400 mt-2">적군의 보급이 제한되며 병력의 훈련도가 낮아 일부가 행동을 멈춥니다.</span>
                              </button>
                              <button 
                                onClick={() => {
                                    if(gameMode === 'campaign') startCampaignGame('normal');
                                    else { setDifficulty('normal'); setGameState('single_upgrade_select'); }
                                }} 
                                className="w-full p-4 bg-slate-800 hover:bg-blue-900/40 border border-blue-700 rounded-lg flex flex-col items-center transition-colors shadow-lg"
                              >
                                <span className="text-xl font-bold text-blue-400">보통 (표준 전술)</span>
                                <span className="text-xs text-slate-400 mt-2">표준적인 전장 환경입니다. 적군이 체계적인 전술을 구사합니다.</span>
                              </button>
                              <button 
                                onClick={() => {
                                    if(gameMode === 'campaign') startCampaignGame('hard');
                                    else { setDifficulty('hard'); setGameState('single_upgrade_select'); }
                                }} 
                                className="w-full p-4 bg-slate-800 hover:bg-red-900/40 border border-red-700 rounded-lg flex flex-col items-center transition-colors shadow-lg"
                              >
                                <span className="text-xl font-bold text-red-400">어려움 (베테랑)</span>
                                <span className="text-xs text-slate-400 mt-2">적군의 보급이 풍족하며, 강화된 정예 부대가 매우 공격적으로 진군합니다.</span>
                              </button>
                            </div>
                          </div>
                        </div>
                      )}

                      {/* 단판 모드 전용 병력 선택 (SINGLE UPGRADE SELECT) */}
                      {gameState === 'single_upgrade_select' && (
                        <div className="absolute inset-0 z-[150] flex items-center justify-center bg-slate-900/90 backdrop-blur-sm">
                          <div className="bg-slate-900 border-2 border-slate-700 p-8 rounded-xl max-w-[800px] w-full text-center shadow-[0_0_50px_rgba(0,0,0,1)] max-h-[95vh] overflow-y-auto custom-scrollbar">
                            <h2 className="text-3xl font-black mb-6 text-white">단판 전면전: 정예 부대 편성</h2>
                            <p className="text-slate-400 mb-6">전장에 투입할 최정예 보병과 전차를 각각 하나씩 선택하십시오.</p>
                            
                            <div className="mb-6">
                               <h3 className="text-xl font-bold text-blue-400 mb-3">보병 업그레이드 선택</h3>
                               <div className="flex gap-4">
                                 {[UNITS.PLAYER_INF_RECON, UNITS.PLAYER_INF_ENHANCED, UNITS.PLAYER_INF_HEAVY].filter(Boolean).map(unit => (
                                   <div key={unit.id} onClick={() => setSingleSetup(prev => ({...prev, inf: unit}))} 
                                        className={`flex-1 bg-slate-800 border-2 ${singleSetup.inf?.id === unit.id ? 'border-yellow-400 bg-slate-700' : 'border-slate-600'} rounded-lg p-4 cursor-pointer hover:border-yellow-400`}>
                                      <div className={`w-12 h-12 mx-auto rounded-full flex items-center justify-center mb-2 ${unit.color.split(' ')[0]}`}>
                                         {unit.icon}
                                      </div>
                                      <div className="font-bold text-sm mb-1 text-slate-200">{unit.name}</div>
                                      <div className="text-[10px] text-slate-400 bg-black/30 p-1 rounded">
                                        체력 {unit.hp} | 타격 {unit.atk} | 이동 {unit.movement}
                                      </div>
                                   </div>
                                 ))}
                               </div>
                            </div>

                            <div className="mb-8">
                               <h3 className="text-xl font-bold text-blue-400 mb-3">전차 업그레이드 선택</h3>
                               <div className="flex gap-4">
                                 {[UNITS.PLAYER_ARMOR_PLUS, UNITS.PLAYER_ARMOR_MEDIUM, UNITS.PLAYER_ARMOR_HEAVY].filter(Boolean).map(unit => (
                                   <div key={unit.id} onClick={() => setSingleSetup(prev => ({...prev, tank: unit}))} 
                                        className={`flex-1 bg-slate-800 border-2 ${singleSetup.tank?.id === unit.id ? 'border-yellow-400 bg-slate-700' : 'border-slate-600'} rounded-lg p-4 cursor-pointer hover:border-yellow-400`}>
                                      <div className={`w-12 h-12 mx-auto rounded-full flex items-center justify-center mb-2 ${unit.color.split(' ')[0]}`}>
                                         {unit.icon}
                                      </div>
                                      <div className="font-bold text-sm mb-1 text-slate-200">{unit.name}</div>
                                      <div className="text-[10px] text-slate-400 bg-black/30 p-1 rounded">
                                        체력 {unit.hp} | 타격 {unit.atk} | 이동 {unit.movement}
                                      </div>
                                   </div>
                                 ))}
                               </div>
                            </div>

                            <button onClick={startSingleGame} disabled={!singleSetup.tank || !singleSetup.inf}
                                    className="w-full py-4 bg-yellow-600 hover:bg-yellow-500 text-white text-lg font-bold rounded-lg disabled:opacity-50 transition-colors">
                               작전 시작
                            </button>
                          </div>
                        </div>
                      )}

                      {/* 미션 완료 화면 (VICTORY) */}
                      {gameState === 'victory' && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
                          <div className="bg-slate-900 border-2 border-slate-700 p-8 rounded-xl max-w-[80%] w-full text-center shadow-[0_0_30px_rgba(0,0,0,1)]">
                            <h2 className="text-4xl font-black mb-4 text-blue-400 drop-shadow-[0_0_10px_rgba(96,165,250,0.8)]">MISSION COMPLETE</h2>
                            <div className="text-slate-300 mb-8 text-sm break-keep space-y-2">
                              <p>스테이지 {stage} 임무를 성공적으로 완수했습니다!</p>
                              <div className="bg-black/40 p-4 rounded-lg border border-slate-800 inline-block w-full max-w-xs mt-2">
                                <div className="flex justify-between mb-2">
                                  <span className="text-slate-400">이번 스테이지 소요 턴:</span>
                                  <span className="font-bold text-yellow-400">{turn + 1} 턴</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">현재까지 총 누적 턴:</span>
                                  <span className="font-bold text-orange-400">{accumulatedTurns + turn + 1} 턴</span>
                                </div>
                              </div>
                            </div>
                            <button 
                              onClick={() => setGameState('reward')}
                              className="w-full py-3 bg-slate-800 hover:bg-slate-700 text-white font-bold rounded-lg transition-colors border border-slate-600"
                            >
                              {stage === 3 ? "전차 부대 업그레이드 및 다음 작전 준비" : stage === 4 ? "보병 부대 업그레이드 및 다음 작전 준비" : "전리품 획득 및 다음 작전 준비"}
                            </button>
                          </div>
                        </div>
                      )}

                      {/* 캠페인 클리어 화면 (GAME CLEAR) */}
                      {gameState === 'game_clear' && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-md">
                          <div className="bg-slate-900 border-2 border-yellow-500 p-10 rounded-xl max-w-[80%] w-full text-center shadow-[0_0_50px_rgba(234,179,8,0.5)]">
                            <h2 className="text-5xl font-black mb-6 text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.8)]">
                              {gameMode === 'single' ? 'BATTLE WON' : 'CAMPAIGN COMPLETE'}
                            </h2>
                            <div className="text-slate-300 mb-8 text-lg break-keep space-y-4">
                              <p>축하합니다, 지휘관님!<br/>{gameMode === 'single' ? '대규모 전면전에서 승리하여 전선을 장악했습니다.' : '적의 심장부를 성공적으로 함락시켰습니다.'}</p>
                              <div className="bg-black/50 p-6 rounded-lg border border-yellow-600/50 inline-block w-full max-w-md mt-4 text-base">
                                <h3 className="text-xl font-bold text-white mb-4 border-b border-slate-700 pb-2">최종 작전 보고서</h3>
                                <div className="flex justify-between mb-2">
                                  <span className="text-slate-400">마지막 전투 소요 턴:</span>
                                  <span className="font-bold text-yellow-400">{turn + 1} 턴</span>
                                </div>
                                <div className="flex justify-between">
                                  <span className="text-slate-400">총 누적 작전 턴:</span>
                                  <span className="font-bold text-orange-400">{accumulatedTurns + turn + 1} 턴</span>
                                </div>
                              </div>
                            </div>
                            <button 
                              onClick={() => {
                                  setGameState('mode_select');
                                  setShowTutorial(false);
                              }}
                              className="w-full py-4 bg-yellow-600 hover:bg-yellow-500 text-white text-lg font-bold rounded-lg transition-colors border border-yellow-400 shadow-[0_0_15px_rgba(202,138,4,0.6)]"
                            >
                              새로운 작전 시작하기
                            </button>
                          </div>
                        </div>
                      )}

                      {/* 신규 부대 증원 및 업그레이드 화면 (REWARD) */}
                      {gameState === 'reward' && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm">
                          <div className="bg-slate-900 border-2 border-yellow-600 p-8 rounded-xl max-w-[90%] w-full text-center shadow-[0_0_40px_rgba(202,138,4,0.4)]">
                            <h2 className="text-2xl font-black mb-4 text-yellow-400">
                              {stage === 3 ? "전차 부대 업그레이드" : stage === 4 ? "보병 부대 업그레이드" : "신규 부대 편성 지원"}
                            </h2>
                            <p className="text-slate-300 mb-6 text-sm break-keep">
                              {stage === 3 
                                ? <React.Fragment>사령부에서 경전차 부대의 장비 업그레이드를 승인했습니다.<br/>세 가지 개량형 중 하나를 선택하십시오. (기존 경전차를 영구 대체합니다)</React.Fragment>
                                : stage === 4
                                ? <React.Fragment>사령부에서 보병 부대의 장비 업그레이드를 승인했습니다.<br/>세 가지 개량형 중 하나를 선택하십시오. (기존 보병을 영구 대체합니다)</React.Fragment>
                                : <React.Fragment>사령부에서 다음 작전을 위한 증원 부대를 지원했습니다.<br/>둘 중 하나를 선택하여 부대에 합류시키십시오.</React.Fragment>}
                            </p>
                            <div className="flex gap-4 justify-center mb-4">
                              {rewardOptions.filter(Boolean).map((unit, idx) => (
                                <div 
                                  key={idx} 
                                  onClick={() => {
                                      let nextUnlocked = [...unlockedUnits];
                                      if (stage === 3) {
                                          const armorIndex = nextUnlocked.findIndex(u => u.id === 'p_armor');
                                          if (armorIndex !== -1) {
                                              nextUnlocked.splice(armorIndex, 1, unit);
                                          } else if (!nextUnlocked.some(u => u.id === unit.id)) {
                                              nextUnlocked.push(unit);
                                          }
                                      } else if (stage === 4) {
                                          const infIndex = nextUnlocked.findIndex(u => u.id === 'p_inf');
                                          if (infIndex !== -1) {
                                              nextUnlocked.splice(infIndex, 1, unit);
                                          } else if (!nextUnlocked.some(u => u.id === unit.id)) {
                                              nextUnlocked.push(unit);
                                          }
                                      } else {
                                          if (!nextUnlocked.some(u => u.id === unit.id)) {
                                              nextUnlocked.push(unit);
                                          }
                                      }
                                      setUnlockedUnits(nextUnlocked);
                                      
                                      let nextEnemyUnlocked = [...enemyUnlockedUnits];
                                      let enemyRewardPool = [];
                                      if (stage === 1) enemyRewardPool = [UNITS.ENEMY_MORTAR, UNITS.ENEMY_ANTITANK, UNITS.ENEMY_SHIELD];
                                      else if (stage === 2) enemyRewardPool = [UNITS.ENEMY_ARTILLERY, UNITS.ENEMY_RECON, UNITS.ENEMY_MRL];
                                      else if (stage === 3) enemyRewardPool = [UNITS.ENEMY_ARMOR_PLUS, UNITS.ENEMY_ARMOR_MEDIUM, UNITS.ENEMY_ARMOR_HEAVY];
                                      else if (stage === 4) enemyRewardPool = [UNITS.ENEMY_INF_RECON, UNITS.ENEMY_INF_ENHANCED, UNITS.ENEMY_INF_HEAVY];
                                      else enemyRewardPool = [UNITS.ENEMY_MORTAR, UNITS.ENEMY_ANTITANK, UNITS.ENEMY_SHIELD, UNITS.ENEMY_ARTILLERY, UNITS.ENEMY_RECON, UNITS.ENEMY_MRL]; 

                                      if (stage !== 3 && stage !== 4) {
                                          enemyRewardPool = enemyRewardPool.filter(eu => !nextEnemyUnlocked.some(u => u.id === eu.id));
                                      }
                                      
                                      if (enemyRewardPool.length > 0) {
                                          const enemyUnit = enemyRewardPool[Math.floor(Math.random() * enemyRewardPool.length)];
                                          setEnemyLastAcquired(enemyUnit); 

                                          if (stage === 3) {
                                              const armorIndex = nextEnemyUnlocked.findIndex(u => u.id === 'e_armor');
                                              if (armorIndex !== -1) nextEnemyUnlocked.splice(armorIndex, 1, enemyUnit);
                                              else nextEnemyUnlocked.push(enemyUnit);
                                          } else if (stage === 4) {
                                              const infIndex = nextEnemyUnlocked.findIndex(u => u.id === 'e_inf');
                                              if (infIndex !== -1) nextEnemyUnlocked.splice(infIndex, 1, enemyUnit);
                                              else nextEnemyUnlocked.push(enemyUnit);
                                          } else {
                                              nextEnemyUnlocked.push(enemyUnit);
                                          }
                                      } else {
                                          setEnemyLastAcquired(null);

                                      >
                                        <IconX /> {(selectedAction === 'attack' || selectedAction === 'supply') && selectedCell.unit.actionPoints?.move > 0 ? '명령 취소 (이동으로)' : '명령 취소'}

                                  </p>

                                {spawnMessage && !spawnMessage.includes("CP") && !spawnMessage.includes("보급됨") && !spawnMessage.includes("진행 중") && (
                                  <p className="text-xs mt-3 text-center font-bold text-orange-400 animate-pulse">{spawnMessage}</p>

                              </div>

                            {selectedCell.unit.id === 'p_hq' && (

                                       className={`w-full flex justify-between items-center p-1.5 px-2 rounded transition-colors disabled:opacity-50 disabled:cursor-not-allowed ${selectedAction === 'produce' && productionUnit?.id === u.id ? 'bg-green-700 border-green-500 shadow-[0_0_10px_rgba(34,197,94,0.8)]' : 'bg-blue-900/50 hover:bg-blue-800 border-blue-700'} border`}

                                {radarUsedThisTurn && <p className="text-xs text-center text-red-400 mt-2">이번 턴 스캔 완료됨</p>}
                              </div>

                            {/* 장갑/무기 정보를 가장 밑으로 */}
                            {selectedCell.unit.id !== 'unknown' && (

                  {spawnMessage}

                  <div className="bg-slate-900 border-2 border-blue-600 p-8 rounded-xl max-w-[550px] w-full shadow-[0_0_40px_rgba(37,99,235,0.4)]">
                    <div className="flex items-center gap-4 mb-6 border-b border-slate-700 pb-4">
                      <div className="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center border-2 border-blue-500 shrink-0">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className="w-9 h-9 text-blue-400">
                          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                          <circle cx="12" cy="7" r="4"></circle>
                          <path d="M12 11l2 4-2 2-2-2 2-4z" fill="currentColor"></path>
                        </svg>
                      </div>
                      <div>
                        <h2 className="text-2xl font-black text-blue-400 tracking-wider">전술 지휘관</h2>
                        <p className="text-slate-400 text-sm">{gameMode === 'single' ? '단판 전면전 브리핑' : `스테이지 ${stage} 작전 브리핑`}</p>
                      </div>
                    </div>
                    
                    <div className="space-y-4 text-slate-300 text-sm leading-relaxed mb-8 max-h-[50vh] overflow-y-auto custom-scrollbar pr-2">
                      {getBriefingText()}
                      <p className="text-yellow-400 font-bold text-center mt-4 pt-2">행운을 빈다, 지휘관.</p>
                    </div>

                    <button 
                      onClick={() => {
                        SoundFX.init();
                        setShowTutorial(false);
                      }}
                      className="w-full py-3 bg-blue-700 hover:bg-blue-600 text-white font-bold rounded-lg transition-colors border border-blue-500 shadow-[0_0_15px_rgba(37,99,235,0.5)]"
                    >
                      작전 시작
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        }
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
