<script>
    document.addEventListener('DOMContentLoaded', () => {
        // [길게 눌러 우클릭하기 패치]
        let touchTimer;
        document.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                touchTimer = setTimeout(() => {
                    const touch = e.touches[0];
                    const event = new MouseEvent('contextmenu', {
                        bubbles: true, cancelable: true,
                        clientX: touch.clientX, clientY: touch.clientY, button: 2
                    });
                    e.target.dispatchEvent(event);
                }, 400); // 0.4초간 누르면 우클릭
            }
        }, { passive: true });

        document.addEventListener('touchend', () => clearTimeout(touchTimer));
        document.addEventListener('touchmove', () => clearTimeout(touchTimer));
    });
</script>

        // --- 사운드 이펙트 (Web Audio API) ---
        let audioCtx = null;
        const SoundFX = {
          init() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
          },
          play(type) {
            this.init();
            if (!audioCtx) return;
            const now = audioCtx.currentTime;

            if (type === 'attack') {
              const osc = audioCtx.createOscillator();
              const gain = audioCtx.createGain();
              osc.type = 'sawtooth';
              osc.frequency.setValueAtTime(100, now);
              osc.frequency.exponentialRampToValueAtTime(10, now + 0.3);
              gain.gain.setValueAtTime(0.3, now);
              gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
              osc.connect(gain);
              gain.connect(audioCtx.destination);
              osc.start(now);
              osc.stop(now + 0.3);
              
              const bufferSize = audioCtx.sampleRate * 0.3;
              const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
              const data = buffer.getChannelData(0);
              for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
              const noise = audioCtx.createBufferSource();
              noise.buffer = buffer;
              const noiseFilter = audioCtx.createBiquadFilter();
              noiseFilter.type = 'lowpass';
              noiseFilter.frequency.value = 800;
              const noiseGain = audioCtx.createGain();
              noiseGain.gain.setValueAtTime(0.3, now);
              noiseGain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
              noise.connect(noiseFilter);
              noiseFilter.connect(noiseGain);
              noiseGain.connect(audioCtx.destination);
              noise.start(now);
            }
            else if (type === 'supply') {
              const osc = audioCtx.createOscillator();
              const gain = audioCtx.createGain();
              osc.type = 'sine';
              osc.frequency.setValueAtTime(400, now);
              osc.frequency.setValueAtTime(600, now + 0.1);
              osc.frequency.setValueAtTime(800, now + 0.2);
              gain.gain.setValueAtTime(0, now);
              gain.gain.linearRampToValueAtTime(0.2, now + 0.05);
              gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
              osc.connect(gain);
              gain.connect(audioCtx.destination);
              osc.start(now);
              osc.stop(now + 0.4);
            }
            else if (type === 'produce') {
              const osc = audioCtx.createOscillator();
              const gain = audioCtx.createGain();
              osc.type = 'square';
              osc.frequency.setValueAtTime(300, now);
              osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
              gain.gain.setValueAtTime(0.2, now);
              gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
              osc.connect(gain);
              gain.connect(audioCtx.destination);
              osc.start(now);
              osc.stop(now + 0.2);
            }
            else if (type === 'move') {
              const osc = audioCtx.createOscillator();
              const gain = audioCtx.createGain();
              osc.type = 'triangle';
              osc.frequency.setValueAtTime(300, now); 
              osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
              gain.gain.setValueAtTime(0.3, now); 
              gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
              osc.connect(gain);
              gain.connect(audioCtx.destination);
              osc.start(now);
              osc.stop(now + 0.1);
            }
          }
        };

                      <div className="bg-black/40 p-4 rounded-lg space-y-2 border border-slate-800">
                        <p><strong className="text-emerald-300">전술 조언:</strong></p>
                        <p>모든 2, 3티어 지원 장비가 개방되어 있습니다. 장갑차로 보병을 신속히 전선에 투입하고 방어선을 사수하십시오.</p>
                        <p className="mt-2 text-yellow-300 font-bold">*정보: 전장 곳곳에 배치된 적 핵심 시설을 파괴하면 대량의 보급(100 CP)을 받을 수 있습니다.</p>
                      </div>
                    </React.Fragment>
                );
            } else if (stage === 1) {
                return (
                    <React.Fragment>
                      <p><strong className="text-white text-base">목표:</strong> 적군 전초기지를 파괴하고 아군 지휘소를 방어하십시오.</p>
                      <div className="bg-black/40 p-4 rounded-lg space-y-2 border border-slate-800">
                        <p><strong className="text-blue-300">기본 조작법:</strong></p>
                        <ul className="list-disc pl-5 space-y-2">
                          <li>아군 유닛을 클릭하여 <strong>이동, 공격, 보급</strong> 등의 전술 명령을 내릴 수 있습니다.</li>
                          <li>명령 버튼을 누른 후, 맵에서 대상 타일을 클릭하여 실행합니다.</li>
                          <li>아군 지휘소를 클릭하면 <strong>CP(지휘 포인트)</strong>를 소모해 새 유닛을 생산할 수 있습니다.</li>
                          <li>모든 행동을 마쳤다면 상단의 <strong>[턴 종료]</strong> 버튼을 누르십시오.</li>
                        </ul>
                      </div>
                      <div className="bg-black/40 p-4 rounded-lg space-y-2 border border-slate-800">
                        <p><strong className="text-emerald-300">상세 정보 창 활용:</strong></p>
                        <ul className="list-disc pl-5 space-y-2">
                          <li><strong>지형 효과:</strong> 타일마다 이동 비용과 방어력 보너스가 다릅니다. 방어하기 좋은 위치를 선점하세요.</li>
                          <li><strong>유닛 상태:</strong> 현재 체력과 함께 남은 <strong>탄약/보급품</strong> 상태를 항상 확인해야 합니다.</li>
                          <li><strong>상성 시스템:</strong> 창 맨 아래의 <span className="text-orange-300">무기</span>와 <span className="text-blue-300">장갑</span> 정보를 확인하십시오. 상성에 따라 피해량이 크게 달라집니다!</li>
                        </ul>
                      </div>
                    </React.Fragment>
                );
            } else if (stage === 5) {
                return (
                    <React.Fragment>
                      <p><strong className="text-white text-base">목표:</strong> 적의 심장부인 시가지를 점령하고 전쟁을 끝내십시오!</p>
                      <div className="bg-black/40 p-4 rounded-lg space-y-2 border border-slate-800">
                        <p><strong className="text-blue-300">작전 환경: {getStageTitle()}</strong></p>
                        <p>복잡한 고층 건물과 진입을 가로막는 방벽으로 이루어진 적의 수도입니다. 시야 확보가 어려우며 곳곳에 적이 매복해 있을 것입니다.</p>
                      </div>
                      <div className="bg-black/40 p-4 rounded-lg space-y-2 border border-slate-800">
                        <p><strong className="text-emerald-300">전술 조언:</strong></p>
                        <p>폐허와 건물은 훌륭한 방어 거점입니다. 방벽은 모든 유닛의 통행을 가로막으므로 우회로를 찾거나 포격으로 적을 견제하십시오.</p>
                        <p className="mt-2 text-yellow-300 font-bold">*정보: 전장 곳곳에 배치된 적 핵심 시설을 파괴하면 대량의 보급(100 CP)을 받을 수 있습니다.</p>
                        <p className="mt-2 text-red-400 font-bold">*경고: 적의 모든 전력이 집중되어 있습니다. 행운을 빕니다, 지휘관님!</p>
                      </div>
                    </React.Fragment>
                );
            } else {
                let themeDesc = "";
                let tip = "";
                if (mapTheme === 'DESERT') {
                    themeDesc = "메마른 사막 지대에 진입했습니다. 이동을 방해하는 모래늪(유사)을 주의하십시오.";
                    tip = "모래 평야는 방어 보너스가 없지만, 오아시스와 바위 언덕을 선점하면 전투를 유리하게 이끌 수 있습니다.";
                } else if (mapTheme === 'TUNDRA') {
                    themeDesc = "혹한의 설원 지대입니다. 시야가 제한되고 크레바스가 도사리고 있습니다.";
                    tip = "얼음길은 이동이 빠르지만 방어에 매우 취약합니다. 눈 덮인 숲과 설산을 적극 활용하십시오.";
                } else if (mapTheme === 'MOUNTAIN_ZONE') {
                    themeDesc = "험준한 고산 지대입니다. 지형이 매우 험악하여 부대 이동이 제한될 것입니다.";
                    tip = "고원은 기본적으로 방어력을 제공하며, 절벽과 고산 숲은 난공불락의 요새가 될 수 있습니다.";
                }

                return (
                    <React.Fragment>
                      <p><strong className="text-white text-base">목표:</strong> 해당 구역의 적군 전초기지를 파괴하고 아군 지휘소를 방어하십시오.</p>
                      <div className="bg-black/40 p-4 rounded-lg space-y-2 border border-slate-800">
                        <p><strong className="text-blue-300">작전 환경: {getStageTitle()}</strong></p>
                        <p>{themeDesc}</p>
                      </div>
                      <div className="bg-black/40 p-4 rounded-lg space-y-2 border border-slate-800">
                        <p><strong className="text-emerald-300">전술 조언:</strong></p>
                        <p>{tip}</p>
                        {stage >= 3 && <p className="mt-2 text-blue-300 font-bold">*전장에 배치된 적의 보급창고를 파괴하면 대량의 CP(200)를 노획할 수 있습니다.</p>}
                        
                        {enemyLastAcquired ? (
                           <p className="mt-2 text-red-400 font-bold">*긴급 보고: 적군이 신규 병력 [{enemyLastAcquired.name}]을(를) 전선에 투입하기 시작했습니다!</p>
                        ) : (
                           <p className="mt-2 text-xs text-orange-300 font-bold">*경고: 적군의 저항이 거세지며, 강력한 병력이 충원될 수 있습니다.</p>
                        )}
                      </div>
                    </React.Fragment>
                );
            }
          };

          const triggerEffect = useCallback((type, x, y) => {
            const id = Date.now() + Math.random();
            setEffects(prev => [...prev, { id, type, x, y }]);
            setTimeout(() => {
              setEffects(prev => prev.filter(e => e.id !== id));
            }, 300);
          }, []);

          const cancelAction = () => {
            setSelectedAction(null);
            actionRef.current = null;
            setReachableCells([]);
            setAttackableCells([]);
            setSupplyableCells([]);
            setSpawnableCells([]);
            setUnloadableCells([]);
            setUnloadIndex(null);
            setProductionUnit(null);
            setSpawnMessage("");
          };

          const handleEndTurn = () => {
            if (isAnimating || currentTurnSide === 'enemy' || gameState !== 'playing') return;
            cancelAction();
            if (selectedCell) setSelectedCell(null);
            
            // 턴 종료 시 레이더 시야 초기화 (적군 턴에는 레이더가 보이지 않음)
            activeRadarRef.current = null;
            setActiveRadar(null);
            setRadarUsedThisTurn(false);

            // 레이더 시야가 초기화된 시야 다시 불러오기
            calculateVisibility(unitData, gridSize, null);
            
            setCurrentTurnSide('enemy');
          };

          const runAITurn = async () => {
            if (gameState !== 'playing') return;
            setIsAnimating(true);
            setSpawnMessage("적군 턴 진행 중...");

            let cpGain = (stage >= 3 || gameMode === 'single') ? 60 : 50;
            if (difficulty === 'easy') cpGain = (stage >= 3 || gameMode === 'single') ? 45 : 40;
            if (difficulty === 'hard') cpGain = (stage >= 3 || gameMode === 'single') ? 80 : 60;

            let currentUnits = unitData.map(u => ({ ...u, actionPoints: { ...u.actionPoints } }));
            let currentEnemyCP = enemyCP + (turn === 0 ? 0 : cpGain);

            await new Promise(r => setTimeout(r, 400));

            currentUnits = currentUnits.map(u => u.side === 'enemy' ? { ...u, actionPoints: { move: u.type === 'unit' ? 1 : 0, attack: 1 } } : u);

            const e_hq = currentUnits.find(u => u.id === 'e_hq');
            if (e_hq) {
               let continueBuilding = true;
               let buildAttempts = 0; 
               
               let breakChance = 0.3;
               if (difficulty === 'easy') breakChance = 0.6;
               if (difficulty === 'hard') breakChance = 0.1;
               
               while (continueBuilding && buildAttempts < 3) {
                   buildAttempts++;

                   if (currentEnemyCP >= 20 && currentEnemyCP < UNITS.ENEMY_ARMOR.cost) {
                       if (Math.random() < breakChance) {
                           continueBuilding = false;
                           break;
                       }
                   }

                   let buildOptions = [];
                   enemyUnlockedUnits.forEach(u => {
                       if (u && currentEnemyCP >= u.cost) {
                           let weight = 1;
                           if (u.category === 'infantry' && u.id.includes('inf')) weight = 3;
                           else if (u.category === 'vehicle' && u.id.includes('armor')) weight = 2;
                           else if (u.id.includes('sniper')) weight = 2;
                           else if (u.id.includes('supply')) weight = 1;
                           else weight = 2;
                           
                           for (let i=0; i<weight; i++) buildOptions.push(u);
                       }
                   });

                   if (buildOptions.length > 0) {
                      const toBuild = buildOptions[Math.floor(Math.random() * buildOptions.length)];
                      const neighbors = [
                        { x: e_hq.x - 1, y: e_hq.y - 1 }, { x: e_hq.x, y: e_hq.y - 1 }, { x: e_hq.x + 1, y: e_hq.y - 1 },
                        { x: e_hq.x - 1, y: e_hq.y },                                   { x: e_hq.x + 1, y: e_hq.y },
                        { x: e_hq.x - 1, y: e_hq.y + 1 }, { x: e_hq.x, y: e_hq.y + 1 }, { x: e_hq.x + 1, y: e_hq.y + 1 }
                      ];
                      const valids = neighbors.filter(n => {
                          if (n.x >= 0 && n.x < gridSize && n.y >= 0 && n.y < gridSize && !currentUnits.some(u => u.x === n.x && u.y === n.y)) {
                              const terrain = mapData[n.y][n.x];
                              if (terrain.id === 'mountain') return toBuild.category === 'infantry';
                              return terrain.moveCost !== 99;
                          }
                          return false;
                      });
                      
                      if (valids.length > 0) {
                         let spawnedUnit = { ...toBuild };
                         if (difficulty === 'hard' && spawnedUnit.type === 'unit') {
                             spawnedUnit.maxHp = Math.floor(spawnedUnit.maxHp * 1.2);
                             spawnedUnit.hp = spawnedUnit.maxHp;
                             spawnedUnit.atk = Math.floor(spawnedUnit.atk * 1.2);
                         } else if (difficulty === 'easy' && spawnedUnit.type === 'unit') {
                             spawnedUnit.maxHp = Math.floor(spawnedUnit.maxHp * 0.9);
                             spawnedUnit.hp = spawnedUnit.maxHp;
                             spawnedUnit.atk = Math.floor(spawnedUnit.atk * 0.9);
                         }

                         currentUnits.push({
                            ...spawnedUnit,
                            uid: `u_ai_${Date.now()}_${Math.floor(Math.random()*10000)}`,
                            x: valids[0].x,
                            y: valids[0].y,
                            actionPoints: { move: 0, attack: 0 },
                            ammo: spawnedUnit.maxAmmo,
                            supplies: spawnedUnit.maxSupplies
                         });
                         currentEnemyCP -= spawnedUnit.cost;
                         SoundFX.play('produce');
                         setUnitData([...currentUnits]);
                         await new Promise(r => setTimeout(r, 150));
                      } else {
                         continueBuilding = false; 
                      }
                   } else {
                      continueBuilding = false; 
                   }
               }
            }

            const enemyUnits = currentUnits.filter(u => u.side === 'enemy' && (u.type === 'unit' || u.canSupply));
            
            const p_hq = currentUnits.find(u => u.side === 'player' && u.id === 'p_hq');
            const playerUnits = currentUnits.filter(u => u.side === 'player');
            
            let hqThreats = [];
            if (e_hq) {
                hqThreats = playerUnits.filter(pu => Math.abs(pu.x - e_hq.x) + Math.abs(pu.y - e_hq.y) <= 6);
            }
            const isHQThreatened = hqThreats.length > 0;

            for (let eu of enemyUnits) {
               if (difficulty === 'easy' && Math.random() < 0.25) {
                   if (eu.actionPoints) {
                       eu.actionPoints.move = 0;
                       eu.actionPoints.attack = 0;
                   }
                   continue; 
               }

               let targetPos = null;
               
               if (eu.canSupply) {
                   let alliesNeedingSupply = currentUnits.filter(u => u.side === 'enemy' && u.type === 'unit' && u.uid !== eu.uid && 
                      (u.hp < u.maxHp || (u.maxAmmo > 0 && u.ammo < u.maxAmmo) || (u.maxSupplies > 0 && u.supplies < u.maxSupplies && (eu.id.includes('hq') || eu.id.includes('depot'))))
                   );
                   if (alliesNeedingSupply.length > 0) {
                       alliesNeedingSupply.sort((a,b) => (Math.abs(eu.x - a.x) + Math.abs(eu.y - a.y)) - (Math.abs(eu.x - b.x) + Math.abs(eu.y - b.y)));
                       targetPos = { x: alliesNeedingSupply[0].x, y: alliesNeedingSupply[0].y };
                   }
               } else {
                   // --- 다양한 전략 구사 (Behavior Selection) ---
                   let behavior = 'engage'; 
                   let r = Math.random();

                   if (isHQThreatened) {
                       let distToHQ = Math.abs(eu.x - e_hq.x) + Math.abs(eu.y - e_hq.y);
                       let defendChance = difficulty === 'hard' ? 0.8 : 0.6;
                       if (distToHQ <= 8 || r < defendChance) {
                           behavior = 'defend';
                       } else {
                           behavior = 'attack_hq'; 
                       }
                   } else {
                       let rushChance = eu.category === 'vehicle' ? 0.5 : 0.2;
                       if (difficulty === 'hard') rushChance += 0.2; 

                       if (r < rushChance) {
                           behavior = 'attack_hq';
                       } else {
                           behavior = 'engage';
                       }
                   }

                   // 1차 목표 설정 (매크로 전략)
                   if (behavior === 'defend' && hqThreats.length > 0) {
                       hqThreats.sort((a,b) => (Math.abs(e_hq.x - a.x) + Math.abs(e_hq.y - a.y)) - (Math.abs(e_hq.x - b.x) + Math.abs(e_hq.y - b.y)));
                       targetPos = { x: hqThreats[0].x, y: hqThreats[0].y };
                   } else if (behavior === 'attack_hq' && p_hq) {
                       targetPos = { x: p_hq.x, y: p_hq.y };
                   } else if (playerUnits.length > 0) {
                       let sortedPlayers = [...playerUnits].sort((a,b) => (Math.abs(eu.x - a.x) + Math.abs(eu.y - a.y)) - (Math.abs(eu.x - b.x) + Math.abs(eu.y - b.y)));
                       targetPos = { x: sortedPlayers[0].x, y: sortedPlayers[0].y };
                   }

                   // --- 세부 마이크로 전술 (탄약/체력 고갈 시) ---
                   const isOutOfAmmo = eu.maxAmmo > 0 && eu.ammo === 0;
                   const isLowHp = eu.hp <= eu.maxHp * 0.3; // 체력이 30% 이하일 때
                   
                   if (targetPos && (isOutOfAmmo || isLowHp)) {
                       // 난이도가 높을수록 유닛을 아끼기 위해 후퇴(보급)할 확률 증가, 낮으면 그대로 고기방패로 사용
                       let retreatChance = difficulty === 'hard' ? 0.75 : 0.4; 
                       
                       if (Math.random() < retreatChance) {
                           // 후퇴 및 보급 (가장 가까운 보급 시설/차량 찾기)
                           let suppliers = currentUnits.filter(u => u.side === 'enemy' && u.canSupply);
                           if (suppliers.length > 0) {
                               suppliers.sort((a,b) => (Math.abs(eu.x - a.x) + Math.abs(eu.y - a.y)) - (Math.abs(eu.x - b.x) + Math.abs(eu.y - b.y)));
                               targetPos = { x: suppliers[0].x, y: suppliers[0].y };
                           }
                       }
                       // retreatChance에 걸리지 않으면 기존 targetPos(전선)로 계속 이동하여 길을 막는 '총알받이' 역할을 수행함
                   }
               }

               if (!targetPos) continue;

               if (eu.actionPoints?.move > 0 && eu.movement > 0) {
                 const queue = [{ x: eu.x, y: eu.y, cost: 0, path: [], hasHazard: false }];
                 const visited = new Map();
                 visited.set(`${eu.x},${eu.y}`, 0);
                 const reachable = [{x: eu.x, y: eu.y, path: [], hasHazard: false}];

                 while (queue.length > 0) {
                     const curr = queue.shift();
                     const dirs = [[0,1], [1,0], [0,-1], [-1,0]];
                     for (let d of dirs) {
                         const nx = curr.x + d[0], ny = curr.y + d[1];
                         if (nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize) {
                             const nTerrain = mapData[ny][nx];
                             let tCost = nTerrain.moveCost;
                             let isHazard = false;
                             
                             if (nTerrain.id === 'mountain') {
                                 if (eu.category === 'infantry') tCost = 2;
                                 else continue;
                             } else if (nTerrain.id === 'river') {
                                 if (nTerrain.name === '방벽') {
                                     continue;
                                 } else if (eu.category === 'vehicle') {
                                     tCost = 2;
                                     isHazard = true;
                                 } else {
                                     continue;
                                 }
                             } else if (tCost === 99) {
                                 continue;
                             }

                             const nCost = curr.cost + tCost;
                             
                             if (nCost <= eu.movement) {
                                 const occ = currentUnits.find(u => u.x === nx && u.y === ny);
                                 if (occ) {
                                     if (occ.side === 'player') continue; 
                                     if (occ.category === 'vehicle' || occ.type === 'building') continue; 
                                 }
                                 const key = `${nx},${ny}`;
                                 if (!visited.has(key) || visited.get(key) > nCost) {
                                     visited.set(key, nCost);
                                     const newPath = [...curr.path, {x: nx, y: ny}];
                                     queue.push({x: nx, y: ny, cost: nCost, path: newPath, hasHazard: curr.hasHazard || isHazard});
                                     
                                     if (!occ && !isHazard) {
                                         reachable.push({x: nx, y: ny, path: newPath, hasHazard: curr.hasHazard || isHazard});
                                     }
                                 }
                             }
                         }
                     }
                 }

                 let bestNode = reachable[0];
                 let minTargetDist = Math.abs(eu.x - targetPos.x) + Math.abs(eu.y - targetPos.y);

                 for (let r of reachable) {
                     let d = Math.abs(r.x - targetPos.x) + Math.abs(r.y - targetPos.y);
                     if (d < minTargetDist) {
                         minTargetDist = d;
                         bestNode = r;
                     }
                 }

                 if (bestNode && (bestNode.x !== eu.x || bestNode.y !== eu.y)) {
                     for (let step of bestNode.path) {
                         eu.x = step.x;
                         eu.y = step.y;
                         SoundFX.play('move');
                         setUnitData([...currentUnits]);
                         await new Promise(r => setTimeout(r, 60)); 
                     }
                     eu.actionPoints.move = 0;
                     if (bestNode.hasHazard) eu.ammo = 0; 
                     calculateVisibility([...currentUnits], gridSize);
                 }
               }

               if (eu.canSupply && (eu.supplies === undefined || eu.supplies > 0) && eu.actionPoints.attack > 0) {
                   let alliesInRange = currentUnits.filter(u => u.side === 'enemy' && u.type === 'unit' && u.uid !== eu.uid && 
                      (Math.abs(eu.x - u.x) + Math.abs(eu.y - u.y)) <= (eu.range || 1) &&
                      (u.hp < u.maxHp || (u.maxAmmo > 0 && u.ammo < u.maxAmmo) || (u.maxSupplies > 0 && u.supplies < u.maxSupplies && (eu.id.includes('hq') || eu.id.includes('depot'))))
                   );
                   alliesInRange.sort((a,b) => (a.hp/a.maxHp) - (b.hp/b.maxHp));
                   
                   if (alliesInRange.length > 0) {
                       let supplyTarget = alliesInRange[0];
                       const healAmount = Math.floor(supplyTarget.maxHp / 2);
                       supplyTarget.hp = Math.min(supplyTarget.maxHp, supplyTarget.hp + healAmount);
                       if (supplyTarget.maxAmmo > 0) supplyTarget.ammo = supplyTarget.maxAmmo;
                       if (supplyTarget.maxSupplies > 0 && (eu.id.includes('hq') || eu.id.includes('depot'))) supplyTarget.supplies = supplyTarget.maxSupplies; 
                       
                       eu.actionPoints.attack = 0; 
                       if (eu.supplies !== undefined) eu.supplies -= 1; 

                       triggerEffect('supply', supplyTarget.x, supplyTarget.y); 
                       SoundFX.play('supply');
                       
                       setUnitData([...currentUnits]);
                       await new Promise(r => setTimeout(r, 300));
                   }
               } else if (!eu.canSupply && eu.ammo > 0 && eu.actionPoints.attack > 0) {
                   let targetsInRange = currentUnits.filter(u => u.side === 'player' && (Math.abs(eu.x - u.x) + Math.abs(eu.y - u.y)) <= (eu.range || 1));
                   
                   if (eu.id === 'e_mortar' || eu.id === 'e_artillery') {
                       targetsInRange = targetsInRange.filter(target => {
                           return currentUnits.some(ally => 
                               ally.side === 'enemy' && 
                               (ally.category === 'infantry') && 
                               (Math.abs(ally.x - target.x) + Math.abs(ally.y - target.y)) <= (ally.vision || 2)
                           );
                       });
                   }

                   if (targetsInRange.length > 0) {
                       targetsInRange.sort((a,b) => a.hp - b.hp); 
                       let attackTarget = targetsInRange[0];
                       
                       const minAtk = Math.floor((eu.atk || 0) * 0.9);
                       const maxAtk = Math.floor((eu.atk || 0) * 1.1);
                       const randomizedAtk = Math.floor(Math.random() * (maxAtk - minAtk + 1)) + minAtk;

                       const defBonus = Math.floor((mapData[attackTarget.y][attackTarget.x].defense || 0) * 5);
                       const baseDamage = Math.max(1, randomizedAtk - defBonus); 
                       
                       const armorId = attackTarget.armorType?.id || 'none';
                       const weaponId = eu.weaponType?.id || 'none';
                       const multiplier = DAMAGE_MULTIPLIERS[armorId]?.[weaponId] ?? 1;
                       
                       const finalDamage = multiplier > 0 ? Math.max(1, Math.floor(baseDamage * multiplier)) : 0;

                       attackTarget.hp -= finalDamage;
                       eu.actionPoints.attack = 0;
                       eu.ammo -= 1;

                       triggerEffect('attack', attackTarget.x, attackTarget.y); 
                       SoundFX.play('attack');

                       if (attackTarget.hp <= 0) {
                           currentUnits = currentUnits.filter(u => u.uid !== attackTarget.uid);
                           if (attackTarget.id === 'p_hq') {
                               setGameState('defeat');
                               setSpawnMessage("치명적 피해! 아군 지휘소가 파괴되었습니다...");
                           } else if (attackTarget.id === 'p_depot') {
                               currentEnemyCP += 200; 
                               setSpawnMessage("아군 보급창고가 파괴되었습니다! (적 CP +200)");
                           } else {
                               currentEnemyCP += 10; 
                           }
                       }

                       setUnitData([...currentUnits]);
                       calculateVisibility([...currentUnits], gridSize);
                       await new Promise(r => setTimeout(r, 300));
                   }
               }
            }

            setEnemyCP(currentEnemyCP);
            currentUnits = currentUnits.map(u => u.side === 'player' ? { ...u, actionPoints: { move: u.type === 'unit' ? 1 : 0, attack: 1 } } : u);
            setUnitData([...currentUnits]);
            calculateVisibility([...currentUnits], gridSize);
            
            // 턴이 시작될 때 레이더 초기화 보장
            activeRadarRef.current = null;
            setActiveRadar(null);
            setRadarUsedThisTurn(false);

            if (gameState === 'playing') {
              setTurn(prev => prev + 1);
              setPlayerCP(prev => prev + (turn === 0 ? 0 : cpGain));
              setCurrentTurnSide('player');
              setIsAnimating(false);
              setSpawnMessage(`[턴 ${turn + 1}] 아군 턴 시작! ${turn === 0 ? '전투 개시!' : `CP ${cpGain} 보급됨.`}`);
              setTimeout(() => setSpawnMessage(""), 2000);
            }
          };

          useEffect(() => {
            if (currentTurnSide === 'enemy') runAITurn();
          }, [currentTurnSide]);

          const calculateVisibility = useCallback((units, currentSize, currentRadar = activeRadarRef.current) => {
            // 0: hidden, 1: radar only, 2: fully visible
            let newVisMap = Array(currentSize).fill(null).map(() => Array(currentSize).fill(0));
            
            // 1. 레이더 시야 적용
            if (currentRadar) {
                for (let y = 0; y < currentSize; y++) {
                    for (let x = 0; x < currentSize; x++) {
                        if (Math.abs(currentRadar.x - x) + Math.abs(currentRadar.y - y) <= currentRadar.radius) {
                            newVisMap[y][x] = 1;
                        }
                    }
                }
            }

            // 2. 유닛 및 시설 시야 적용 (우선순위 최고)
            units.forEach(unit => {
              if (unit.side === 'player') {
                const vision = unit.vision || 2;
                for (let y = 0; y < currentSize; y++) {
                  for (let x = 0; x < currentSize; x++) {
                    if (Math.abs(unit.x - x) + Math.abs(unit.y - y) <= vision) {
                      newVisMap[y][x] = 2;
                    }
                  }
                }
              }
            });
            setVisibilityMap(newVisMap);
          }, []);

          const generateMap = useCallback((targetStage, mode) => {
            setIsGenerating(true);
            
            let newSize = mode === 'single' ? 20 : 12 + Math.floor((targetStage - 1) / 2);
            setGridSize(newSize);

            let themeKey = 'NORMAL';
            if (targetStage === 1 && mode === 'campaign') {
                historyRef.current = []; 
            }
            
            if (mode === 'single') {
                const themes = ['NORMAL', 'DESERT', 'TUNDRA', 'MOUNTAIN_ZONE', 'URBAN'];
                themeKey = themes[Math.floor(Math.random() * themes.length)];
                const specials = [UNITS.ENEMY_MORTAR, UNITS.ENEMY_ANTITANK, UNITS.ENEMY_SHIELD, UNITS.ENEMY_ARTILLERY, UNITS.ENEMY_APC, UNITS.ENEMY_RECON, UNITS.ENEMY_MRL, UNITS.ENEMY_INF_RECON, UNITS.ENEMY_INF_ENHANCED, UNITS.ENEMY_INF_HEAVY];
                setEnemySpecialUnit(specials[Math.floor(Math.random() * specials.length)]);
            } else if (targetStage === 5) {
                themeKey = 'URBAN';
                const specials = [UNITS.ENEMY_MORTAR, UNITS.ENEMY_ANTITANK, UNITS.ENEMY_SHIELD, UNITS.ENEMY_ARTILLERY, UNITS.ENEMY_APC, UNITS.ENEMY_RECON, UNITS.ENEMY_MRL, UNITS.ENEMY_INF_RECON, UNITS.ENEMY_INF_ENHANCED, UNITS.ENEMY_INF_HEAVY];
                setEnemySpecialUnit(specials[Math.floor(Math.random() * specials.length)]);
            } else if (targetStage >= 2) {
                const themes = ['DESERT', 'TUNDRA', 'MOUNTAIN_ZONE'];
                const recentThemes = historyRef.current.slice(-2);
                let availableThemes = themes.filter(t => !recentThemes.includes(t));
                if (availableThemes.length === 0) availableThemes = themes; 
                
                themeKey = availableThemes[Math.floor(Math.random() * availableThemes.length)];
                historyRef.current.push(themeKey); 
                
                let specials = [];
                if (targetStage === 2) {
                    specials = [UNITS.ENEMY_MORTAR, UNITS.ENEMY_ANTITANK, UNITS.ENEMY_SHIELD];
                } else if (targetStage === 3) {
                    specials = [UNITS.ENEMY_MORTAR, UNITS.ENEMY_ANTITANK, UNITS.ENEMY_SHIELD, UNITS.ENEMY_ARTILLERY, UNITS.ENEMY_APC, UNITS.ENEMY_RECON, UNITS.ENEMY_MRL];
                } else if (targetStage >= 4) {
                    specials = [UNITS.ENEMY_MORTAR, UNITS.ENEMY_ANTITANK, UNITS.ENEMY_SHIELD, UNITS.ENEMY_ARTILLERY, UNITS.ENEMY_APC, UNITS.ENEMY_RECON, UNITS.ENEMY_MRL, UNITS.ENEMY_INF_RECON, UNITS.ENEMY_INF_ENHANCED, UNITS.ENEMY_INF_HEAVY];
                }
                setEnemySpecialUnit(specials[Math.floor(Math.random() * specials.length)]);
            } else {
                setEnemySpecialUnit(null);
            }
            
            setMapTheme(themeKey);
            const currentTerrainSet = THEME_TERRAINS[themeKey];

            const playerHQPos = { x: 1, y: newSize - 2 };
            const enemyHQPos = { x: newSize - 2, y: 1 };

            const isHQZone = (x, y) => (Math.abs(x - playerHQPos.x) <= 1 && Math.abs(y - playerHQPos.y) <= 1) || (Math.abs(x - enemyHQPos.x) <= 1 && Math.abs(y - enemyHQPos.y) <= 1);

            let newMap;
            let isPathValid = false;

            const checkPath = (mapToCheck) => {
              const queue = [{ x: playerHQPos.x, y: playerHQPos.y }];
              const visited = Array(newSize).fill(null).map(() => Array(newSize).fill(false));
              visited[playerHQPos.y][playerHQPos.x] = true;

              while (queue.length > 0) {
                const curr = queue.shift();
                if (curr.x === enemyHQPos.x && curr.y === enemyHQPos.y) return true;
                const dirs = [[0, 1], [1, 0], [0, -1], [-1, 0]];
                for (let d of dirs) {
                  const nx = curr.x + d[0];
                  const ny = curr.y + d[1];
                  if (nx >= 0 && nx < newSize && ny >= 0 && ny < newSize && !visited[ny][nx]) {
                    if (mapToCheck[ny][nx].moveCost !== 99) { 
                      visited[ny][nx] = true;
                      queue.push({ x: nx, y: ny });
                    }
                  }
                }
              }
              return false; 
            };

            while (!isPathValid) {
              newMap = Array(newSize).fill(null).map(() => Array(newSize).fill(currentTerrainSet.PLAIN));

              const isHorizontalRiver = Math.random() > 0.5;
              const startFromZero = Math.random() > 0.5; 
              let riverPos = Math.floor(Math.random() * (newSize - 6)) + 3; 
              const riverLength = Math.floor(newSize * 0.4) + Math.floor(Math.random() * (newSize * 0.3)); 
              
              for (let i = 0; i < riverLength; i++) {
                const currentI = startFromZero ? i : newSize - 1 - i;
                if (isHorizontalRiver) {
                  if (!isHQZone(currentI, riverPos)) newMap[riverPos][currentI] = currentTerrainSet.RIVER;
                  if (Math.random() > 0.6 && riverPos < newSize - 1 && !isHQZone(currentI, riverPos + 1)) newMap[riverPos + 1][currentI] = currentTerrainSet.RIVER;
                  riverPos += Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0;
                  riverPos = Math.max(1, Math.min(newSize - 2, riverPos));
                } else {
                  if (!isHQZone(riverPos, currentI)) newMap[currentI][riverPos] = currentTerrainSet.RIVER;
                  if (Math.random() > 0.6 && riverPos < newSize - 1 && !isHQZone(riverPos + 1, currentI)) newMap[currentI][riverPos + 1] = currentTerrainSet.RIVER;
                  riverPos += Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : -1) : 0;
                  riverPos = Math.max(1, Math.min(newSize - 2, riverPos));
                }
              }

              let bridgeIndex = Math.floor(newSize / 2) + (Math.floor(Math.random() * 4) - 2);
              if (isHorizontalRiver) {
                for(let i=0; i<newSize; i++) {
                  if (!isHQZone(bridgeIndex, i)) newMap[i][bridgeIndex] = currentTerrainSet.ROAD;
                }
              } else {
                for(let i=0; i<newSize; i++) {
                  if (!isHQZone(i, bridgeIndex)) newMap[bridgeIndex][i] = currentTerrainSet.ROAD;
                }
              }

              const placeClusters = (terrainType, numClusters, clusterSize) => {
                for (let c = 0; c < numClusters; c++) {
                  let cx = Math.floor(Math.random() * newSize);
                  let cy = Math.floor(Math.random() * newSize);
                  for (let i = 0; i < clusterSize; i++) {
                    let nx = cx + Math.floor(Math.random() * 3) - 1;
                    let ny = cy + Math.floor(Math.random() * 3) - 1;
                    if (nx >= 0 && nx < newSize && ny >= 0 && ny < newSize) {
                      if (newMap[ny][nx].id === 'plain' && !isHQZone(nx, ny)) {
                        newMap[ny][nx] = terrainType;
                      }
                    }
                  }
                }
              };

              placeClusters(currentTerrainSet.FOREST, mode === 'single' ? 15 : 6, 8);
              placeClusters(currentTerrainSet.MOUNTAIN, mode === 'single' ? 10 : 4, 5);
              placeClusters(currentTerrainSet.RIVER, mode === 'single' ? 8 : 3, 4);

              isPathValid = checkPath(newMap);
            }

            setMapData(newMap);

            const newUnits = [];
            let uidCounter = 0;
            const addUnit = (unitDef, x, y) => {
              newUnits.push({ 
                ...unitDef, uid: `u_${uidCounter++}`, x, y,
                actionPoints: { move: unitDef.type === 'unit' ? 1 : 0, attack: 1 },
                ammo: unitDef.type === 'unit' ? unitDef.maxAmmo : undefined,
                supplies: unitDef.type === 'unit' ? unitDef.maxSupplies : undefined
              });
            };

            addUnit(UNITS.PLAYER_HQ, playerHQPos.x, playerHQPos.y);
            addUnit(UNITS.ENEMY_HQ, enemyHQPos.x, enemyHQPos.y);

            const getValidDepotPos = (target) => {
                for (let r = 0; r < 8; r++) {
                    for (let y = target.y - r; y <= target.y + r; y++) {
                        for (let x = target.x - r; x <= target.x + r; x++) {
                            if (x >= 0 && x < newSize && y >= 0 && y < newSize) {
                                if (!isHQZone(x, y) && newMap[y][x].moveCost !== 99) {
                                    if (!newUnits.some(u => u.x === x && u.y === y)) {
                                        return {x, y};
                                    }
                                }
                            }
                        }
                    }
                }
                return target;
            };

            if (mode === 'single') {
                const p1 = getValidDepotPos({x: playerHQPos.x + 3, y: playerHQPos.y - 6});
                if (p1) addUnit(UNITS.PLAYER_DEPOT, p1.x, p1.y);
                const p2 = getValidDepotPos({x: playerHQPos.x + 6, y: playerHQPos.y - 3});
                if (p2 && (p2.x !== p1.x || p2.y !== p1.y)) addUnit(UNITS.PLAYER_DEPOT, p2.x, p2.y);

                const e1 = getValidDepotPos({x: enemyHQPos.x - 3, y: enemyHQPos.y + 6});
                if (e1) addUnit(UNITS.ENEMY_DEPOT, e1.x, e1.y);
                const e2 = getValidDepotPos({x: enemyHQPos.x - 6, y: enemyHQPos.y + 3});
                if (e2 && (e2.x !== e1.x || e2.y !== e1.y)) addUnit(UNITS.ENEMY_DEPOT, e2.x, e2.y);
            } else if (targetStage >= 3) {
                const midX = Math.floor(newSize / 2);
                const midY = Math.floor(newSize / 2);
                
                const pDepotPos = getValidDepotPos({ x: Math.floor((playerHQPos.x + midX) / 2), y: Math.floor((playerHQPos.y + midY) / 2) });
                addUnit(UNITS.PLAYER_DEPOT, pDepotPos.x, pDepotPos.y);

                const eDepotPos = getValidDepotPos({ x: Math.floor((enemyHQPos.x + midX) / 2), y: Math.floor((enemyHQPos.y + midY) / 2) });
                addUnit(UNITS.ENEMY_DEPOT, eDepotPos.x, eDepotPos.y);
            }

            if (targetStage === 5 || mode === 'single') {
                const getValidFacilityPos = () => {
                    for (let r = 0; r < 50; r++) {
                        const x = Math.floor(Math.random() * newSize);
                        const y = Math.floor(Math.random() * newSize);
                        if (!isHQZone(x, y) && newMap[y][x].moveCost !== 99) {
                            if (!newUnits.some(u => u.x === x && u.y === y)) {
                                return {x, y};
                            }
                        }
                    }
                    return null;
                };

                for (let i = 0; i < 2; i++) {
                    const pos = getValidFacilityPos();
                    if (pos) addUnit(UNITS.ENEMY_FACILITY, pos.x, pos.y);
                }
            }

            setUnitData(newUnits);
            
            activeRadarRef.current = null;
            setActiveRadar(null);
            setRadarUsedThisTurn(false);
            
            calculateVisibility(newUnits, newSize, null);
            setSelectedCell(null);
            setPlayerCP(mode === 'single' ? 300 : 200);
            setEnemyCP(mode === 'single' ? 300 : 200);
            setCurrentTurnSide('player');
            setTurn(0); 
            cancelAction();
            
            setTimeout(() => setIsGenerating(false), 100);
          }, [calculateVisibility]);

          const startCampaignGame = (selectedDifficulty) => {
            setDifficulty(selectedDifficulty);
            setStage(1);
            setUnlockedUnits([UNITS.PLAYER_INF, UNITS.PLAYER_SNIPER, UNITS.PLAYER_SUPPLY, UNITS.PLAYER_ARMOR, UNITS.PLAYER_APC].filter(Boolean));
            setEnemyUnlockedUnits([UNITS.ENEMY_INF, UNITS.ENEMY_SNIPER, UNITS.ENEMY_SUPPLY, UNITS.ENEMY_ARMOR, UNITS.ENEMY_APC].filter(Boolean));
            setAccumulatedTurns(0);
            generateMap(1, 'campaign');
            setGameState('playing');
            setShowTutorial(true);
            SoundFX.init();
          };

          const startSingleGame = () => {
            setUnlockedUnits([
                singleSetup.inf, UNITS.PLAYER_SNIPER, UNITS.PLAYER_SUPPLY, singleSetup.tank, UNITS.PLAYER_APC,
                UNITS.PLAYER_MORTAR, UNITS.PLAYER_ANTITANK, UNITS.PLAYER_SHIELD,
                UNITS.PLAYER_ARTILLERY, UNITS.PLAYER_RECON, UNITS.PLAYER_MRL
            ].filter(Boolean));

            const enemyTanks = [UNITS.ENEMY_ARMOR_PLUS, UNITS.ENEMY_ARMOR_MEDIUM, UNITS.ENEMY_ARMOR_HEAVY];
            const enemyInfs = [UNITS.ENEMY_INF_RECON, UNITS.ENEMY_INF_ENHANCED, UNITS.ENEMY_INF_HEAVY];
            setEnemyUnlockedUnits([
                enemyInfs[Math.floor(Math.random() * 3)], UNITS.ENEMY_SNIPER, UNITS.ENEMY_SUPPLY, enemyTanks[Math.floor(Math.random() * 3)], UNITS.ENEMY_APC,
                UNITS.ENEMY_MORTAR, UNITS.ENEMY_ANTITANK, UNITS.ENEMY_SHIELD,
                UNITS.ENEMY_ARTILLERY, UNITS.ENEMY_RECON, UNITS.ENEMY_MRL
            ].filter(Boolean));

            setAccumulatedTurns(0);
            setStage(1);
            generateMap(1, 'single');
            setGameState('playing');
            setShowTutorial(true);
            SoundFX.init();
          };
          const handleUnloadClick = (idx) => {
            if (isAnimating || gameState !== 'playing') return;
            setUnloadIndex(idx);
            setSelectedAction('unload');
            actionRef.current = 'unload';

            const cells = [];
            const dirs = [[0,1], [1,0], [0,-1], [-1,0]];
            for(let d of dirs) {
                const nx = selectedCell.x + d[0];
                const ny = selectedCell.y + d[1];
                if(nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize) {
                    const terrain = mapData[ny][nx];
                    let canUnload = false;
                    if (terrain.id === 'mountain') {
                        canUnload = true;
                    } else if (terrain.moveCost !== 99) {
                        canUnload = true;
                    }
                    if(canUnload && !unitData.some(u => u.x === nx && u.y === ny)) {
                        cells.push({x: nx, y: ny});
                    }
                }
            }
            setUnloadableCells(cells);
          };

          const calculateAttackableTiles = (startX, startY, range) => {
            const attackable = [];
            const attacker = unitData.find(u => u.x === startX && u.y === startY);

            for (let y = 0; y < gridSize; y++) {
              for (let x = 0; x < gridSize; x++) {
                const distance = Math.abs(startX - x) + Math.abs(startY - y);
                if (distance <= range && distance > 0) {
                  const terrain = mapData[y][x];
                  
                  // 방벽 타겟팅 룰 (폭발 무기 소유자)
                  if (terrain.id === 'river' && terrain.name === '방벽' && attacker && attacker.weaponType?.id === 'explosive') {
                     if (attacker.id === 'p_mortar' || attacker.id === 'e_mortar' || attacker.id === 'p_artillery' || attacker.id === 'e_artillery') {
                         const isSpotted = unitData.some(ally => 
                            ally.side === attacker.side && 
                            (ally.category === 'infantry') && 
                            (Math.abs(ally.x - x) + Math.abs(ally.y - y) <= (ally.vision || 2))
                         );
                         const isRadarSpotted = activeRadarRef.current && (Math.abs(activeRadarRef.current.x - x) + Math.abs(activeRadarRef.current.y - y) <= activeRadarRef.current.radius);
                         if (!isSpotted && !isRadarSpotted) continue;
                     }
                     attackable.push({ x, y, isWall: true });
                     continue;
                  }

                  if (attacker && (attacker.id === 'p_mortar' || attacker.id === 'e_mortar' || attacker.id === 'p_artillery' || attacker.id === 'e_artillery')) {
                     const isSpotted = unitData.some(ally => 
                        ally.side === attacker.side && 
                        (ally.category === 'infantry') && 
                        (Math.abs(ally.x - x) + Math.abs(ally.y - y) <= (ally.vision || 2))
                     );
                     const isRadarSpotted = activeRadarRef.current && (Math.abs(activeRadarRef.current.x - x) + Math.abs(activeRadarRef.current.y - y) <= activeRadarRef.current.radius);
                     if (!isSpotted && !isRadarSpotted) continue;
                  }

                  const occupant = unitData.find(u => u.x === x && u.y === y);
                  if (occupant && occupant.side === 'player') continue;
                  if (occupant) attackable.push({ x, y, isWall: false });
                }
              }
            }
            return attackable;
          };

          const calculateSupplyableTiles = (startX, startY, range) => {
            const supplyable = [];
            for (let y = 0; y < gridSize; y++) {
              for (let x = 0; x < gridSize; x++) {
                const distance = Math.abs(startX - x) + Math.abs(startY - y);
                if (distance <= range && distance > 0) {
                  const occupant = unitData.find(u => u.x === x && u.y === y && u.side === 'player' && u.type === 'unit');
                  if (occupant) supplyable.push({ x, y });
                }
              }
            }
            return supplyable;
          };

          const handleActionSelect = (action) => {
            if (isAnimating || gameState !== 'playing') return;

            const unit = selectedCell?.unit;
            if (!unit || unit.side !== 'player' || (unit.type !== 'unit' && !unit.canSupply)) return;

            if (action === 'move' && unit.actionPoints?.move === 0) return;
            if (action === 'attack' && (unit.actionPoints?.attack === 0 || unit.ammo === 0)) return;
            if (action === 'supply' && (unit.actionPoints?.attack === 0 || (unit.maxSupplies > 0 && unit.supplies === 0))) return;

            setActiveUnit(unit); 
            setSelectedAction(action);
            actionRef.current = action; 

            if (action === 'move') {
              setReachableCells(calculateReachableTiles(unit.x, unit.y, unit.movement));
              setAttackableCells([]); setSupplyableCells([]); setSpawnableCells([]); setProductionUnit(null);
              setUnloadableCells([]); setUnloadIndex(null);
            } else if (action === 'attack') {
              setAttackableCells(calculateAttackableTiles(unit.x, unit.y, unit.range || 1));
              setReachableCells([]); setSupplyableCells([]); setSpawnableCells([]); setProductionUnit(null);
              setUnloadableCells([]); setUnloadIndex(null);
            } else if (action === 'supply') {
              setSupplyableCells(calculateSupplyableTiles(unit.x, unit.y, unit.range || 1));
              setAttackableCells([]); setReachableCells([]); setSpawnableCells([]); setProductionUnit(null);
              setUnloadableCells([]); setUnloadIndex(null);
            }
          };

          const calculateReachableTiles = (startX, startY, movement) => {
            const queue = [{ x: startX, y: startY, cost: 0, path: [], hasHazard: false }];
            const visited = new Map();
            visited.set(`${startX},${startY}`, 0);
            const reachable = [];
            const movingUnit = unitData.find(u => u.x === startX && u.y === startY);

            while (queue.length > 0) {
              queue.sort((a, b) => a.cost - b.cost);
              const current = queue.shift();

              const occupant = unitData.find(u => u.x === current.x && u.y === current.y);
              const terrain = mapData[current.y][current.x];
              
              let canStand = false;
              if (terrain.id === 'river' && terrain.name !== '방벽') {
                  canStand = false; 
              } else if (!occupant || (occupant.x === startX && occupant.y === startY)) {
                canStand = true;
              } else if (movingUnit && movingUnit.category === 'infantry' && occupant.side === movingUnit.side && occupant.id.includes('apc')) {
                const boardedCount = occupant.boarded ? occupant.boarded.length : 0;
                if (boardedCount < (occupant.capacity || 3)) {
                  canStand = true;
                }
              }

              if (canStand) {
                if (!reachable.find(r => r.x === current.x && r.y === current.y)) {
                  reachable.push({ x: current.x, y: current.y, path: current.path, hasHazard: current.hasHazard });
                }
              }

              const neighbors = [
                { x: current.x + 1, y: current.y }, { x: current.x - 1, y: current.y },
                { x: current.x, y: current.y + 1 }, { x: current.x, y: current.y - 1 }
              ];

              for (let n of neighbors) {
                if (n.x >= 0 && n.x < gridSize && n.y >= 0 && n.y < gridSize) {
                  const nTerrain = mapData[n.y][n.x];
                  let terrainCost = nTerrain.moveCost;
                  let isHazard = false;

                  if (nTerrain.id === 'mountain') {
                      if (movingUnit && movingUnit.category === 'infantry') {
                          terrainCost = 2; 
                      } else {
                          continue; 
                      }
                  } else if (nTerrain.id === 'river') {
                      if (nTerrain.name === '방벽') {
                          continue; 
                      } else if (movingUnit && movingUnit.category === 'vehicle') {
                          terrainCost = 2; 
                          isHazard = true;
                      } else {
                          continue; 
                      }
                  } else if (terrainCost === 99) {
                      continue;
                  }

                  const occupyingUnit = unitData.find(u => u.x === n.x && u.y === n.y);
                  if (occupyingUnit) {
                     if (occupyingUnit.side === 'enemy') continue;
                     if (occupyingUnit.category === 'vehicle' || occupyingUnit.type === 'building') {
                         if (movingUnit && movingUnit.category === 'infantry' && occupyingUnit.id.includes('apc')) {
                             const boardedCount = occupyingUnit.boarded ? occupyingUnit.boarded.length : 0;
                             if (boardedCount >= (occupyingUnit.capacity || 3)) continue;
                         } else {
                             continue; 
                         }
                     }
                  }

                  const newCost = current.cost + terrainCost;
                  if (newCost <= movement) {
                    const key = `${n.x},${n.y}`;
                    if (!visited.has(key) || visited.get(key) > newCost) {
                      visited.set(key, newCost);
                      queue.push({ x: n.x, y: n.y, cost: newCost, path: [...current.path, { x: n.x, y: n.y }], hasHazard: current.hasHazard || isHazard });
                    }
                  }
                }
              }
            }
            return reachable;
          };

          const handleCellClick = (x, y) => {
            if (isAnimating || currentTurnSide === 'enemy' || gameState !== 'playing') return;

            const currentAction = actionRef.current; 
            const visLevel = visibilityMap[y]?.[x] || 0;
            const isVisible = visLevel > 0;
            
            // 레이더 실행
            if (currentAction === 'radar') {
                actionRef.current = null;
                setSelectedAction(null);
                setPlayerCP(prev => prev - 10);
                setRadarUsedThisTurn(true);
                const radius = gameMode === 'single' ? 5 : (stage >= 3 ? 4 : 3);
                const newRadar = { x, y, radius };
                activeRadarRef.current = newRadar;
                setActiveRadar(newRadar);
                calculateVisibility(unitData, gridSize, newRadar);
                SoundFX.play('supply'); 
                setSpawnMessage("레이더 스캔 완료!");
                setTimeout(() => setSpawnMessage(""), 2000);
                return;
            }

            let realClickedUnit = unitData.find(u => u.x === x && u.y === y);
            let displayClickedUnit = realClickedUnit;

            if (realClickedUnit && realClickedUnit.side === 'enemy') {
                if (visLevel === 0) {
                    realClickedUnit = undefined;
                    displayClickedUnit = undefined;
                } else if (visLevel === 1) {
                    let uName = '미확인 신호';
                    if (realClickedUnit.type === 'building') uName = '미확인 시설';
                    else if (realClickedUnit.category === 'infantry') uName = '미확인 보병';
                    else if (realClickedUnit.category === 'vehicle') uName = '미확인 차량';

                    displayClickedUnit = {
                        uid: realClickedUnit.uid,
                        id: 'unknown',
                        name: uName,
                        side: 'enemy',
                        type: realClickedUnit.type,
                        category: realClickedUnit.category,
                        hp: '???',
                        maxHp: '???',
                        atk: '???',
                        range: '???',
                        movement: '???',
                        armorType: { name: '???' },
                        weaponType: { name: '???' },
                        icon: <IconUnknown />,
                        color: 'bg-slate-800',
                        bg: true
                    };
                }
            }
            
            // 하차 (Unload)
            if (currentAction === 'unload' && activeUnit) {
              if (unloadableCells.some(c => c.x === x && c.y === y)) {
                actionRef.current = null; 
                const unitToUnload = activeUnit.boarded[unloadIndex];
                const newUnloadedUnit = { ...unitToUnload, x, y, actionPoints: { move: 0, attack: 0 } };
                
                const newBoarded = activeUnit.boarded.filter((_, i) => i !== unloadIndex);
                const newApc = { ...activeUnit, boarded: newBoarded };

                setUnitData(prev => [...prev.map(u => u.uid === activeUnit.uid ? newApc : u), newUnloadedUnit]);
                
                SoundFX.play('move');
                setSpawnMessage(`${unitToUnload.name} 하차 완료!`);
                setTimeout(() => setSpawnMessage(""), 1500);

                setActiveUnit(newApc); 
                setSelectedCell({ x: newApc.x, y: newApc.y, terrain: mapData[newApc.y][newApc.x], unit: newApc, isVisible: true });
                cancelAction();
                return;
              } else {
                cancelAction();
                return;
              }
            }

            // 생산
            if (currentAction === 'produce' && productionUnit) {
              actionRef.current = null; 
              if (spawnableCells.some(cell => cell.x === x && cell.y === y)) {
                const newUnit = { 
                  ...productionUnit, 
                  uid: `u_${Date.now()}_${Math.floor(Math.random()*1000)}`, 
                  x, y, actionPoints: { move: 0, attack: 0 },
                  ammo: productionUnit.maxAmmo, supplies: productionUnit.maxSupplies
                };
                const newUnitData = [...unitData, newUnit];
                
                setUnitData(newUnitData);
                setPlayerCP(prev => prev - productionUnit.cost);
                calculateVisibility(newUnitData, gridSize);
                SoundFX.play('produce');
                setSpawnMessage(`${productionUnit.name} 배치 완료!`);
                setTimeout(() => setSpawnMessage(""), 2500);
                cancelAction();
                return;
              } else {
                cancelAction();
                setSpawnMessage("생산이 취소되었습니다.");
                setTimeout(() => setSpawnMessage(""), 1500);
                return;
              }
            }

            // 이동
            if (currentAction === 'move' && activeUnit) {
              const targetCell = reachableCells.find(cell => cell.x === x && cell.y === y);
              if (targetCell) {
                if (activeUnit.x === x && activeUnit.y === y) { cancelAction(); return; }

                actionRef.current = null; 
                setIsAnimating(true);
                setSelectedAction(null);
                setReachableCells([]); setAttackableCells([]); setSupplyableCells([]);
                
                const path = targetCell.path;
                let step = 0;
                
                const moveStep = () => {
                  if (step >= path.length) {
                    setIsAnimating(false);
                    const finalPos = path[path.length - 1];
                    const targetOccupant = unitData.find(u => u.x === finalPos.x && u.y === finalPos.y && u.uid !== activeUnit.uid);
                    
                    if (targetOccupant && targetOccupant.id.includes('apc') && activeUnit.category === 'infantry') {
                        const boardedUnit = { ...activeUnit, x: finalPos.x, y: finalPos.y, actionPoints: { move: 0, attack: 0 } };
                        const updatedApc = { ...targetOccupant, boarded: [...(targetOccupant.boarded || []), boardedUnit] };

                        setUnitData(prevData => {
                            return prevData.map(u => {
                                if (u.uid === targetOccupant.uid) return updatedApc;
                                if (u.uid === activeUnit.uid) return null;
                                return u;
                            }).filter(Boolean);
                        });
                        
                        setSpawnMessage(`${activeUnit.name} 탑승 완료!`);
                        setTimeout(() => setSpawnMessage(""), 1500);
                        
                        setActiveUnit(updatedApc); 
                        setSelectedCell({ x: finalPos.x, y: finalPos.y, terrain: mapData[finalPos.y][finalPos.x], unit: updatedApc, isVisible: true });
                        cancelAction();
                    } else {
                        let finalAmmo = activeUnit.ammo;
                        if (targetCell.hasHazard) {
                            finalAmmo = 0;
                            setSpawnMessage("차량 도하 통과: 탄약을 전부 잃었습니다.");
                            setTimeout(() => setSpawnMessage(""), 2000);
                        }

                        const updatedActiveUnit = { ...activeUnit, x, y, actionPoints: { ...activeUnit.actionPoints, move: 0 }, ammo: finalAmmo };
                        setActiveUnit(updatedActiveUnit); 
                        setSelectedCell(prev => ({ ...prev, x, y, terrain: mapData[y][x], unit: updatedActiveUnit, isVisible: true }));
                    }
                    return;
                  }
                  
                  const nextPos = path[step];
                  const currentStep = step; 
                  
                  setUnitData(prevData => {
                    const newData = prevData.map(u => {
                      if (u.uid === activeUnit.uid) {
                        const isLastStep = (currentStep === path.length - 1);
                        return { 
                            ...u, 
                            x: nextPos.x, 
                            y: nextPos.y, 
                            actionPoints: isLastStep ? { ...u.actionPoints, move: 0 } : u.actionPoints,
                            ammo: (isLastStep && targetCell.hasHazard) ? 0 : u.ammo
                        };
                      }
                      return u;
                    });
                    calculateVisibility(newData, gridSize);
                    return newData;
                  });
                  
                  step++;
                  SoundFX.play('move');
                  setTimeout(moveStep, 60);
                };
                moveStep();
                return;
              }
            }

            // 공격
            if (currentAction === 'attack' && activeUnit) {
              const targetAttackData = attackableCells.find(cell => cell.x === x && cell.y === y);
              if (targetAttackData) {
                actionRef.current = null; 

                if (targetAttackData.isWall) {
                    triggerEffect('attack', x, y); 
                    SoundFX.play('attack');

                    let newUnitData = unitData.map(u => 
                      u.uid === activeUnit.uid ? { ...u, actionPoints: { ...u.actionPoints, attack: 0 }, ammo: 0 } : u
                    );
                    
                    let newMapData = [...mapData];
                    newMapData[y] = [...newMapData[y]];
                    newMapData[y][x] = THEME_TERRAINS.URBAN.FOREST; 
                    setMapData(newMapData);

                    setSpawnMessage(`방벽 파괴 완료! (탄약 전량 소모)`);
                    setUnitData(newUnitData);
                    calculateVisibility(newUnitData, gridSize);
                    setTimeout(() => setSpawnMessage(""), 2000);

                    const updatedActiveUnit = { ...activeUnit, actionPoints: { ...activeUnit.actionPoints, attack: 0 }, ammo: 0 };
                    setActiveUnit(updatedActiveUnit); 
                    setSelectedCell(prev => prev ? { ...prev, unit: updatedActiveUnit, terrain: THEME_TERRAINS.URBAN.FOREST } : null);

                    setSelectedAction(null);
                    setAttackableCells([]);
                    return;
                }

                if (realClickedUnit && realClickedUnit.side === 'enemy' && isVisible) {
                  const minAtk = Math.floor((activeUnit.atk || 0) * 0.9);
                  const maxAtk = Math.floor((activeUnit.atk || 0) * 1.1);
                  const randomizedAtk = Math.floor(Math.random() * (maxAtk - minAtk + 1)) + minAtk;

                  const defBonus = Math.floor((mapData[y][x].defense || 0) * 5);
                  const baseDamage = Math.max(1, randomizedAtk - defBonus);
                  
                  const armorId = realClickedUnit.armorType?.id || 'none';
                  const weaponId = activeUnit.weaponType?.id || 'none';
                  const multiplier = DAMAGE_MULTIPLIERS[armorId]?.[weaponId] ?? 1;
                  
                  const finalDamage = multiplier > 0 ? Math.max(1, Math.floor(baseDamage * multiplier)) : 0;
                  const newHp = realClickedUnit.hp - finalDamage;
                  
                  triggerEffect('attack', x, y); 
                  SoundFX.play('attack');

                  let newUnitData = unitData.map(u => 
                    u.uid === activeUnit.uid ? { ...u, actionPoints: { ...u.actionPoints, attack: 0 }, ammo: u.ammo - 1 } : u
                  );
                  
                  if (newHp <= 0) {
                    newUnitData = newUnitData.filter(u => u.uid !== realClickedUnit.uid);
                    if (realClickedUnit.id === 'e_hq') {
                        if (gameMode === 'single' || stage === 5) {
                            setGameState('game_clear');
                        } else {
                            let pool = [];
                            if (stage === 1) {
                                pool = [UNITS.PLAYER_MORTAR, UNITS.PLAYER_ANTITANK, UNITS.PLAYER_SHIELD];
                                const shuffled = pool.sort(() => 0.5 - Math.random());
                                setRewardOptions(shuffled.slice(0, 2));
                            } else if (stage === 2) {
                                pool = [UNITS.PLAYER_ARTILLERY, UNITS.PLAYER_RECON, UNITS.PLAYER_MRL];
                                const shuffled = pool.sort(() => 0.5 - Math.random());
                                setRewardOptions(shuffled.slice(0, 2));
                            } else if (stage === 3) {
                                setRewardOptions([UNITS.PLAYER_ARMOR_PLUS, UNITS.PLAYER_ARMOR_MEDIUM, UNITS.PLAYER_ARMOR_HEAVY]);
                            } else if (stage === 4) {
                                setRewardOptions([UNITS.PLAYER_INF_RECON, UNITS.PLAYER_INF_ENHANCED, UNITS.PLAYER_INF_HEAVY]);
                            } else {
                                pool = [UNITS.PLAYER_MORTAR, UNITS.PLAYER_ANTITANK, UNITS.PLAYER_SHIELD, UNITS.PLAYER_ARTILLERY, UNITS.PLAYER_RECON, UNITS.PLAYER_MRL];
                                const shuffled = pool.sort(() => 0.5 - Math.random());
                                setRewardOptions(shuffled.slice(0, 2));
                            }
                            
                            setGameState('victory');
                            setSpawnMessage(`임무 완수! 적 기지를 파괴했습니다!`);
                        }
                    } else if (realClickedUnit.id === 'e_depot') {
                        setPlayerCP(prev => prev + 200); 
                        setSpawnMessage("적 보급창고 파괴! (+200 CP)");
                    } else if (realClickedUnit.id === 'e_facility') {
                        setPlayerCP(prev => prev + 100); 
                        setSpawnMessage("적 핵심 시설 파괴! (+100 CP)");
                    } else {
                        setPlayerCP(prev => prev + 10); 
                        setSpawnMessage(visLevel === 1 ? "미확인 적 유닛 격파! (+10 CP)" : `적 ${realClickedUnit.name} 격파! (+10 CP)`);
                    }
                  } else {
                    newUnitData = newUnitData.map(u => u.uid === realClickedUnit.uid ? { ...u, hp: newHp } : u);
                    const hpText = visLevel === 1 ? '???' : newHp;
                    setSpawnMessage(`명중! (피해: ${finalDamage}, 적 HP: ${hpText})`);
                  }
                  
                  setUnitData(newUnitData);
                  calculateVisibility(newUnitData, gridSize);
                  setTimeout(() => setSpawnMessage(""), 2000);

                  const updatedActiveUnit = { ...activeUnit, actionPoints: { ...activeUnit.actionPoints, attack: 0 }, ammo: activeUnit.ammo - 1 };
                  setActiveUnit(updatedActiveUnit); 
                  setSelectedCell(prev => prev ? { ...prev, unit: updatedActiveUnit } : null);

                } else {
                  setSpawnMessage("공격할 수 없는 위치입니다.");
                  setTimeout(() => setSpawnMessage(""), 1500);
                }
                
                setSelectedAction(null);
                setAttackableCells([]);
                return;
              } else {
                if (realClickedUnit && realClickedUnit.side === 'enemy') {
                  setSpawnMessage("사거리가 닿지 않습니다!");
                  setTimeout(() => setSpawnMessage(""), 2000);
                }
                cancelAction();
                return;
              }
            }

            // 보급
            if (currentAction === 'supply' && activeUnit) {
              if (supplyableCells.some(cell => cell.x === x && cell.y === y)) {
                actionRef.current = null; 

                if (realClickedUnit && realClickedUnit.side === 'player') {
                  const healAmount = Math.floor(realClickedUnit.maxHp / 2);
                  const newHp = Math.min(realClickedUnit.maxHp, realClickedUnit.hp + healAmount);
                  
                  let newUnitData = unitData.map(u => {
                    if (u.uid === activeUnit.uid) {
                       let updatedSupplier = { ...u, actionPoints: { ...u.actionPoints, attack: 0 } };
                       if (u.supplies !== undefined) updatedSupplier.supplies -= 1; 
                       return updatedSupplier;
                    }
                    if (u.uid === realClickedUnit.uid) {
                        let suppliedUnit = { ...u, hp: newHp };
                        if (u.maxAmmo > 0) suppliedUnit.ammo = u.maxAmmo;
                        if (u.maxSupplies > 0 && (activeUnit.id.includes('hq') || activeUnit.id.includes('depot'))) suppliedUnit.supplies = u.maxSupplies; 
                        return suppliedUnit;
                    }
                    return u;
                  });

                  triggerEffect('supply', x, y); 
                  SoundFX.play('supply');

                  setSpawnMessage(`[${realClickedUnit.name}] 보급 완료!`);
                  setUnitData(newUnitData);
                  setTimeout(() => setSpawnMessage(""), 2500);

                  const updatedActiveUnit = { ...activeUnit, actionPoints: { ...activeUnit.actionPoints, attack: 0 }, supplies: activeUnit.supplies !== undefined ? activeUnit.supplies - 1 : undefined };
                  setActiveUnit(updatedActiveUnit); 
                  setSelectedCell(prev => prev ? { ...prev, unit: updatedActiveUnit } : null);

                } else {
                  setSpawnMessage("아군 유닛에게만 보급할 수 있습니다.");
                  setTimeout(() => setSpawnMessage(""), 1500);
                }
                
                setSelectedAction(null);
                setSupplyableCells([]);
                return;
              } else {
                if (realClickedUnit && realClickedUnit.side === 'player') {
                  setSpawnMessage("보급 사거리가 닿지 않습니다!");
                  setTimeout(() => setSpawnMessage(""), 2000);
                }
                cancelAction();
                return;
              }
            }

            setSelectedCell({ x, y, terrain: mapData[y][x], unit: displayClickedUnit, isVisible });
            
            const newActiveUnit = realClickedUnit && realClickedUnit.side === 'player' ? realClickedUnit : null;
            setActiveUnit(newActiveUnit);

            if (newActiveUnit && (newActiveUnit.type === 'unit' || newActiveUnit.canSupply)) {
              if (newActiveUnit.actionPoints?.move > 0) {
                setSelectedAction('move');
                actionRef.current = 'move';
                setReachableCells(calculateReachableTiles(newActiveUnit.x, newActiveUnit.y, newActiveUnit.movement));
                setAttackableCells([]); setSupplyableCells([]); setSpawnableCells([]); setProductionUnit(null);
              } else {
                cancelAction();
              }
            } else {
              cancelAction();
            }
          };

          const initiateProduction = (unitType) => {
            if (isAnimating || playerCP < unitType.cost) {
              if (playerCP < unitType.cost) {
                setSpawnMessage("CP가 부족합니다.");
                setTimeout(() => setSpawnMessage(""), 2000);
              }
              return;
            }

            if (!selectedCell || selectedCell.unit?.id !== 'p_hq') return;

            const hq = selectedCell.unit;
            const neighbors = [
              { x: hq.x - 1, y: hq.y - 1 }, { x: hq.x, y: hq.y - 1 }, { x: hq.x + 1, y: hq.y - 1 },
              { x: hq.x - 1, y: hq.y },                               { x: hq.x + 1, y: hq.y },
              { x: hq.x - 1, y: hq.y + 1 }, { x: hq.x, y: hq.y + 1 }, { x: hq.x + 1, y: hq.y + 1 }
            ];

            const validSpawns = [];
            for (let n of neighbors) {
              if (n.x >= 0 && n.x < gridSize && n.y >= 0 && n.y < gridSize) {
                const terrain = mapData[n.y][n.x];
                let canSpawn = false;

                if (terrain.id === 'mountain') {
                    if (unitType.category === 'infantry') canSpawn = true;
                } else if (terrain.moveCost !== 99) {
                    canSpawn = true;
                }

                const hasUnit = unitData.some(u => u.x === n.x && u.y === n.y);
                if (canSpawn && !hasUnit) {
                  validSpawns.push(n);
                }
              }
            }

            if (validSpawns.length > 0) {
              setSelectedAction('produce');
              actionRef.current = 'produce'; 
              setProductionUnit(unitType);
              setSpawnableCells(validSpawns);
              setSpawnMessage(""); 
            } else {
              setSpawnMessage("주변에 배치할 빈 공간이 없습니다.");
              setTimeout(() => setSpawnMessage(""), 2000);
            }
          };

          return (
            <div className="flex flex-col h-screen bg-slate-900 text-slate-200 font-sans" onClick={() => SoundFX.init()}>
              <header className="p-4 bg-slate-950 border-b border-slate-800 flex justify-between items-center shadow-md shrink-0">
                <div>
                  <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                    <IconShield />
                    작전 구역 <span className="text-blue-400 text-lg ml-2">{gameMode === 'single' ? '단판 전면전' : `스테이지 ${stage}: ${getStageTitle()}`}</span>
                  </h1>
                  <div className="flex items-center gap-3 mt-1">
                    <p className="text-slate-400 text-sm">로그라이크 택티컬 시뮬레이터 ({difficulty === 'easy' ? '쉬움' : difficulty === 'hard' ? '어려움' : '보통'})</p>
                    <span className={`px-2 py-0.5 rounded text-xs font-bold border ${currentTurnSide === 'player' ? 'bg-blue-900 text-blue-300 border-blue-700' : 'bg-red-900 text-red-300 border-red-700 animate-pulse'}`}>
                      TURN {turn} - {currentTurnSide === 'player' ? '아군 턴' : '적군 턴 진행중'}
                    </span>
                  </div>
                </div>
                <div className="flex items-center gap-4">
                  <div className="bg-slate-900 px-4 py-2 rounded border border-yellow-600/50 flex items-center gap-2 shadow-inner">
                    <span className="text-slate-400 text-sm font-bold">지휘 포인트</span>
                    <span className="text-yellow-400 font-mono text-lg">{playerCP} CP</span>
                  </div>
                  
                  <button 
                    onClick={handleEndTurn}
